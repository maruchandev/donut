<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<meta name="theme-color" content="#0a0908">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>どーなつ — 大画面表示</title>
<style>
  :root {
    --bg: #0a0908;
    --surface: #141210;
    --border: #2e2820;
    --text: #f8f2ea;
    --text-muted: #9a8e80;
    --text-dim: #5c5248;
    --ja-accent: #5b9fd4;
    --ko-accent: #e8789a;
    --accent: #e8913a;
    --error: #e85d5d;
    --ok: #5cad6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Sans JP', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ---- lobby ---- */
  #lobby {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }
  #lobby.hidden { display: none; }

  .lobby-card {
    width: min(480px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    text-align: center;
  }
  .lobby-logo {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .lobby-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .lobby-sub {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .room-code {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .room-digit {
    width: 52px;
    height: 56px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    outline: none;
    font-family: inherit;
    caret-color: var(--accent);
  }
  .room-digit:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #e8913a28;
  }
  .lobby-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .lobby-btn:hover { filter: brightness(1.08); }
  .lobby-btn:disabled { opacity: 0.5; cursor: default; }
  .lobby-error {
    color: var(--error);
    font-size: 13px;
    margin-top: 12px;
    min-height: 1.2em;
  }

  /* ---- display ---- */
  #display {
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  #display.open { display: flex; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-size: 14px;
    font-weight: 800;
    color: var(--accent);
    white-space: nowrap;
  }
  .topbar-room {
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  .topbar-spacer { flex: 1; }
  .conn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.on { background: var(--ok); box-shadow: 0 0 8px #5cad6a66; }
  .dot.off { background: var(--error); }

  .btn-icon {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-icon:hover {
    background: var(--border);
    color: var(--text);
  }

  .columns {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .col {
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 24px 32px 20px;
    overflow: hidden;
  }
  .col-ja {
    border-right: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1118 0%, var(--bg) 100%);
  }
  .col-ko {
    background: linear-gradient(180deg, #140d10 0%, var(--bg) 100%);
  }

  .col-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(14px, 1.4vw, 18px);
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .col-ja .col-label { color: var(--ja-accent); }
  .col-ko .col-label { color: var(--ko-accent); }
  .col-label-flag { font-size: 1.3em; line-height: 1; }

  .current {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .current-text {
    font-weight: 600;
    line-height: 1.45;
    word-break: break-word;
    transition: opacity 0.15s;
  }
  .col-ja .current-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(28px, 4.2vw, 64px);
  }
  .col-ko .current-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(28px, 4.2vw, 64px);
  }
  .current-text.interim { opacity: 0.72; }
  .current-text.empty {
    color: var(--text-dim);
    font-size: clamp(18px, 2vw, 28px);
    font-weight: 500;
    opacity: 0.5;
  }

  .history-wrap {
    flex-shrink: 0;
    max-height: 28%;
    min-height: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    overflow-y: auto;
  }
  .history-wrap::-webkit-scrollbar { width: 4px; }
  .history-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .hist-item {
    font-size: clamp(13px, 1.4vw, 20px);
    line-height: 1.5;
    color: var(--text-muted);
    margin-bottom: 10px;
    word-break: break-word;
    animation: fadeIn 0.25s ease;
  }
  .hist-item:last-child { margin-bottom: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* fullscreen: hide chrome */
  body.fs .topbar { display: none; }
  body.fs .col { padding: 32px 40px 24px; }

  @media (max-width: 768px) {
    .columns {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .col-ja { border-right: none; border-bottom: 1px solid var(--border); }
    .col { padding: 16px 20px 12px; }
    .history-wrap { max-height: 22%; }
  }

  @media (max-width: 600px) {
    .topbar { padding: 8px 12px; gap: 8px; }
    .conn-label { display: none; }
    .room-digit { width: 44px; height: 48px; font-size: 22px; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <div class="lobby-logo">どーなつ</div>
    <h1 class="lobby-title" id="lobbyTitle">大画面表示</h1>
    <p class="lobby-sub" id="lobbySub">プロジェクター用の日韓同時表示画面です。先に通常画面（index.html）で同じルーム番号に入室してから、ここで接続してください。ルームがまだ無い場合は自動で待機します。</p>
    <div class="room-code" id="roomCode">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="1">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="2">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="3">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="4">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="5">
      <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="6">
    </div>
    <button class="lobby-btn" id="joinBtn" type="button">接続</button>
    <p class="lobby-error" id="lobbyError"></p>
  </div>
</div>

<div id="display">
  <header class="topbar">
    <span class="topbar-brand">どーなつ</span>
    <span class="topbar-room" id="roomNum"></span>
    <span class="topbar-spacer"></span>
    <span class="conn">
      <span class="dot off" id="connDot"></span>
      <span class="conn-label" id="connLabel">切断</span>
    </span>
    <button class="btn-icon" id="fsBtn" type="button">全画面</button>
  </header>

  <div class="columns">
    <section class="col col-ja">
      <div class="col-label">
        <span class="col-label-flag">🇯🇵</span>
        <span id="jaLabel">日本語</span>
      </div>
      <div class="current">
        <div class="current-text empty" id="jaCurrent">翻訳を待っています…</div>
      </div>
      <div class="history-wrap" id="jaHistory"></div>
    </section>
    <section class="col col-ko">
      <div class="col-label">
        <span class="col-label-flag">🇰🇷</span>
        <span id="koLabel">한국어</span>
      </div>
      <div class="current">
        <div class="current-text empty" id="koCurrent">번역을 기다리는 중…</div>
      </div>
      <div class="history-wrap" id="koHistory"></div>
    </section>
  </div>
</div>

<script src="screen.js"></script>
</body>
</html>
