<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>Stream Translator</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #131920;
    --surface-2: #1a222d;
    --border: #2a3441;
    --text: #e6edf3;
    --text-muted: #8b9cb3;
    --text-dim: #5c6b7f;
    --accent: #3d8bfd;
    --accent-hover: #58a6ff;
    --record: #f85149;
    --record-hover: #da3633;
    --idle: #2ea043;
    --idle-hover: #3fb950;
    --mine-border: #3d8bfd44;
    --other-border: #2a3441;
    --error: #f85149;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .logo span { color: var(--accent); }

  .bar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .bar-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .bar-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }

  .bar select, .bar input {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }

  .bar select:focus, .bar input:focus {
    border-color: var(--accent);
    outline: none;
  }

  .bar button {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }

  .btn-record {
    background: var(--record);
    color: #fff;
    border-color: var(--record);
  }

  .btn-record:hover { background: var(--record-hover); }

  .btn-record.idle {
    background: var(--idle);
    border-color: var(--idle);
  }

  .btn-record.idle:hover { background: var(--idle-hover); }

  .btn-record:disabled { opacity: 0.4; cursor: default; }

  .btn-record.recording {
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.5);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
  }

  .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .conn {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .conn-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .input-footer {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-row textarea {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea:disabled { opacity: 0.4; }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 2px 0;
  }

  .input-row button {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
    height: 42px;
    margin-bottom: 0;
  }

  .btn-send {
    background: var(--accent);
    color: #fff;
  }

  .btn-send:hover { background: var(--accent-hover); }
  .btn-send:disabled { opacity: 0.4; cursor: default; }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
    user-select: none;
  }

  .empty-state .icon { font-size: 32px; opacity: 0.5; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 280px; }

  .entry {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--other-border);
    animation: in 0.2s ease;
    max-width: 92%;
  }

  .entry.mine {
    align-self: flex-end;
    border-color: var(--mine-border);
    background: var(--surface-2);
  }

  .entry.other { align-self: flex-start; }

  .entry.interim {
    opacity: 0.7;
    border-style: dashed;
  }

  .entry.error {
    align-self: center;
    max-width: 100%;
    border-color: #f8514944;
    background: #f8514911;
  }

  @keyframes in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry .spk {
    font-weight: 600;
    font-size: 11px;
    margin-bottom: 6px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .entry .spk-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .entry .main {
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    word-break: break-word;
  }

  .entry .sub {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
    margin-top: 4px;
    word-break: break-word;
  }

  .entry .main.tent { color: var(--text-muted); }
  .entry .main.final { color: var(--text); }
  .entry .sub.tent { color: var(--text-dim); }
  .entry .sub.waiting {
    color: var(--text-dim);
    font-style: italic;
    animation: fade-wait 1.4s ease-in-out infinite;
  }

  @keyframes fade-wait {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.on { background: var(--idle); box-shadow: 0 0 6px #3fb95066; }
  .dot.off { background: var(--record); box-shadow: 0 0 6px #f8514966; }

  .hint { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .dir-hint {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .room-badge {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--surface-2);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    margin-left: auto;
  }
  .room-badge:hover { background: var(--border); }

  #lobby {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
  }
  #lobby.hidden { display: none; }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 48px 40px 40px;
    width: 380px;
    max-width: 90vw;
    text-align: center;
  }
  .lobby-card h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 32px;
  }
  .lobby-card h1 span { color: var(--accent); }
  .lobby-card .sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .lobby-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .lobby-row input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .lobby-row input:focus { border-color: var(--accent); }
  .lobby-row input::placeholder {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--text-dim);
  }
  .lobby-row button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: background 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .lobby-row button:hover { background: var(--accent-hover); }
  .lobby-divider {
    color: var(--text-dim);
    font-size: 12px;
    margin: 16px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lobby-divider::before, .lobby-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .btn-new-room {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-new-room:hover { background: var(--surface-2); }
  .lobby-error {
    color: var(--record);
    font-size: 12px;
    margin-top: 12px;
    min-height: 1.2em;
  }

  @media (max-width: 600px) {
    header, .bar, .input-footer { padding-left: 14px; padding-right: 14px; }
    .log { padding: 12px 14px; }
    .bar-divider { display: none; }
    .status { width: 100%; margin-left: 0; order: 10; }
    .entry { max-width: 100%; }
    .lobby-card { padding: 32px 24px 28px; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <h1>Stream <span>Translator</span></h1>
    <p class="sub" id="lobbySub">ルーム番号を入力するか、新しいルームを作成してください</p>
    <div class="lobby-row">
      <input type="text" id="roomInput" maxlength="6" inputmode="numeric" pattern="[0-9]*" placeholder="000000">
      <button id="joinBtn">入室</button>
    </div>
    <div class="lobby-divider">or</div>
    <button class="btn-new-room" id="newRoomBtn">新しいルームを作成</button>
    <p class="lobby-error" id="lobbyError"></p>
  </div>
</div>

<div id="chat" style="display:none">
<header>
  <div class="logo">Stream <span>Translator</span></div>
  <span class="room-badge" id="roomBadge" title="クリックでコピー"></span>
  <span class="conn">
    <span class="dot off" id="connDot"></span>
    <span class="conn-label" id="connLabel">Disconnected</span>
  </span>
</header>

<div class="bar">
  <div class="bar-group">
    <span class="hint" id="hintLang"></span>
    <select id="myLang">
      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
    </select>
    <span class="dir-hint" id="dirHint"></span>
  </div>
  <span class="bar-divider"></span>
  <div class="bar-group">
    <span class="hint" id="hintNick"></span>
    <input type="text" id="spkInput" placeholder="" size="10" maxlength="20">
  </div>
  <span class="bar-divider"></span>
  <button id="recordBtn" class="btn-record idle" disabled></button>
  <span class="status" id="statusMsg"></span>
</div>

<div class="log" id="log">
  <div class="empty-state" id="emptyState">
    <div class="icon">🎙️</div>
    <p id="emptyText"></p>
  </div>
</div>

<div class="input-footer">
  <div class="input-row">
    <textarea id="textInput" rows="1" placeholder="" disabled></textarea>
    <button id="sendBtn" class="btn-send" disabled></button>
  </div>
  <span class="input-hint" id="inputHint"></span>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
