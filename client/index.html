<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<meta name="description" content="どーなつ — 日韓の会話を、まるくつなぐ。話すだけで翻訳が届くカジュアル通訳。">
<meta name="theme-color" content="#f8f4ee">
<script src="theme.js?v=1"></script>
<meta property="og:title" content="どーなつ | 日韓リアルタイム通訳">
<meta property="og:description" content="話すだけで翻訳が届く。6桁のルーム番号で、日本語と韓国語の会話をまるくつなぐ。">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<title>どーなつ — 日韓リアルタイム通訳</title>
<link rel="stylesheet" href="theme.css?v=6">
<link rel="stylesheet" href="app.css?v=10">
</head>
<body>

<div id="lobby">
  <div class="landing">
    <header class="landing-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="16" r="15" fill="var(--donut-outer)"/><circle cx="16" cy="16" r="11" fill="var(--donut-inner)"/><circle cx="16" cy="16" r="5.5" fill="var(--donut-hole)"/><path d="M8 11c2-3 5-4 8-4s6 1 8 4" fill="none" stroke="var(--donut-glaze)" stroke-width="2.2" stroke-linecap="round"/></svg>
        <span class="brand-name" id="brandName">どーなつ</span>
      </div>
      <button type="button" class="btn-theme" aria-label="Theme">☾</button>
    </header>

    <section class="hero">
      <span class="hero-badge" id="heroBadge">会話も講演も</span>
      <div class="hero-visual">
        <svg class="hero-donut" viewBox="0 0 88 88" aria-hidden="true"><circle cx="44" cy="44" r="40" fill="var(--donut-outer)"/><circle cx="44" cy="44" r="30" fill="var(--donut-inner)"/><circle cx="44" cy="44" r="14" fill="var(--donut-hole)"/><path d="M18 28c6-10 16-14 26-14s20 4 26 14" fill="none" stroke="var(--donut-glaze)" stroke-width="5" stroke-linecap="round"/><circle cx="28" cy="24" r="3" fill="var(--surface)" opacity=".7"/><circle cx="58" cy="26" r="2.5" fill="var(--surface)" opacity=".5"/></svg>
      </div>
      <h1 id="heroTitle">どーなつ</h1>
      <p class="hero-desc" id="heroDesc">日韓の会話を、まるくつなぐ。話すだけで翻訳が届くカジュアル通訳。ルーム番号を共有して、すぐにはじめられます。</p>
    </section>

    <section class="start-section" id="start">
      <div class="cta-card">
        <p class="sub" id="lobbySub">ルーム番号を入力するか、新しいルームを作成してください</p>
        <div class="lobby-join">
          <div class="room-code" id="roomCode">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="1">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="2">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="3">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="4">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="5">
            <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="6">
          </div>
          <button id="joinBtn" type="button">入室</button>
        </div>
        <div class="lobby-divider hidden" id="lobbyDivider">or</div>
        <div class="lobby-create-wrap hidden" id="createWrap">
          <label class="create-password-label" for="createPassword" id="createPasswordLabel">発行パスワード</label>
          <input type="password" id="createPassword" class="create-password-input" autocomplete="off" maxlength="128">
          <button class="btn-new-room" id="newRoomBtn">新しいルームを作成</button>
        </div>
        <p class="lobby-error" id="lobbyError"></p>
      </div>
    </section>

    <footer class="landing-footer">
      <p><span class="brand-inline">どーなつ</span> — <span id="footerTagline">日韓リアルタイム通訳</span></p>
    </footer>
  </div>
</div>

<div id="chat">
<header>
  <button type="button" class="logo chat-logo" id="homeBtn" title="">
    <svg class="chat-logo-mark" viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="16" r="15" fill="var(--donut-outer)"/><circle cx="16" cy="16" r="11" fill="var(--donut-inner)"/><circle cx="16" cy="16" r="5.5" fill="var(--donut-hole)"/></svg>
    <span class="chat-logo-name" id="chatLogoName">どーなつ</span>
  </button>
  <div class="header-center">
    <button type="button" class="room-badge" id="roomBadge" title="">
      <span class="room-badge-label" id="roomBadgeLabel">ルーム</span>
      <span class="room-badge-num" id="roomBadgeNum"></span>
      <span class="room-badge-icon" id="roomBadgeIcon">QR</span>
    </button>
  </div>
  <div class="header-end">
    <button type="button" class="btn-theme" aria-label="Theme">☾</button>
    <span class="conn">
      <span class="dot off" id="connDot"></span>
      <span class="conn-label" id="connLabel">Disconnected</span>
    </span>
    <div class="menu-wrap">
      <button id="menuBtn" class="btn-menu" type="button" aria-label="Menu">⋯</button>
      <div id="menuDrop" class="menu-drop hidden">
        <a id="screenLink" class="menu-item" href="screen.html" target="_blank" rel="noopener noreferrer">大画面表示</a>
        <button id="dissolveBtn" class="menu-item danger" type="button">ルームを解散</button>
      </div>
    </div>
  </div>
</header>

<div class="session-bar">
  <div class="session-controls">
    <div class="control-group">
      <span class="control-label" id="langLabel">言語</span>
      <select id="myLang">
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
    </div>
    <span class="dir-hint" id="dirHint"></span>
    <button id="recordBtn" class="btn-record idle" disabled></button>
  </div>
  <div class="session-meta">
    <input type="text" id="spkInput" class="bar-nick" placeholder="" maxlength="20">
    <span class="status" id="statusMsg"></span>
  </div>
</div>

<div class="log-panel">
  <div class="log" id="log">
    <div class="empty-state hidden" id="emptyState">
      <svg class="icon" viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="16" r="15" fill="var(--donut-outer)"/><circle cx="16" cy="16" r="11" fill="var(--donut-inner)"/><circle cx="16" cy="16" r="5.5" fill="var(--donut-hole)"/><path d="M8 11c2-3 5-4 8-4s6 1 8 4" fill="none" stroke="var(--donut-glaze)" stroke-width="2" stroke-linecap="round"/></svg>
      <p id="emptyText"></p>
    </div>
    <div class="history-top hidden" id="historyTop"></div>
  </div>
</div>

<div class="input-footer">
  <div class="input-row">
    <textarea id="textInput" rows="1" placeholder="" disabled></textarea>
    <button id="sendBtn" class="btn-send" disabled></button>
  </div>
  <span class="input-hint" id="inputHint"></span>
</div>
</div>

<span class="copy-toast" id="copyToast" aria-live="polite"></span>

<div id="qrModal" class="qr-modal hidden">
  <div class="qr-card">
    <button id="qrClose" class="qr-close" type="button" aria-label="close">&times;</button>
    <div class="qr-title" id="qrTitle">ルームを共有</div>
    <div class="qr-room-num" id="qrRoomNum"></div>
    <div class="qr-wrap" id="qrCode"></div>
    <p class="qr-hint" id="qrHint">QRコードを読み取って入室</p>
    <div class="qr-actions" id="qrActions">
      <button id="qrShareBtn" class="btn-qr-share hidden" type="button">共有</button>
      <a id="qrScreenLink" class="btn-qr-copy" href="screen.html" target="_blank" rel="noopener noreferrer">大画面表示を開く</a>
      <button id="qrCopyBtn" class="btn-qr-copy" type="button">リンクをコピー</button>
    </div>
  </div>
</div>

<script src="vendor/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
