<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>Stream Translator</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #131920;
    --surface-2: #1a222d;
    --border: #2a3441;
    --text: #e6edf3;
    --text-muted: #8b9cb3;
    --text-dim: #5c6b7f;
    --accent: #3d8bfd;
    --accent-hover: #58a6ff;
    --record: #f85149;
    --record-hover: #da3633;
    --idle: #2ea043;
    --idle-hover: #3fb950;
    --mine-border: #3d8bfd44;
    --other-border: #2a3441;
    --error: #f85149;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
  }

  #chat {
    display: none;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
    overflow: hidden;
  }

  #chat.open {
    display: flex;
  }

  header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    grid-column: 1;
    justify-self: start;
  }

  .header-end {
    grid-column: 3;
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .menu-wrap {
    position: relative;
  }

  .btn-menu {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-menu:hover {
    background: var(--border);
    color: var(--text);
  }

  .menu-drop {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 8px 24px #00000055;
    z-index: 50;
  }
  .menu-drop.hidden { display: none; }

  .menu-item {
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .menu-item:hover { background: var(--surface-2); }
  .menu-item.danger { color: var(--record); }
  .menu-item.danger:hover { background: #f8514918; }

  .qr-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000aa;
    padding: 20px;
  }
  .qr-modal.hidden { display: none; }

  .qr-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px 24px;
    width: min(320px, 100%);
    text-align: center;
    box-shadow: 0 16px 48px #00000066;
  }
  .qr-close {
    position: absolute;
    top: 10px;
    right: 12px;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
  }
  .qr-close:hover { background: var(--surface-2); color: var(--text); }
  .qr-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .qr-room-num {
    font-size: 28px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .qr-wrap {
    display: inline-flex;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 14px;
  }
  .qr-wrap canvas,
  .qr-wrap img {
    display: block;
    width: 200px !important;
    height: 200px !important;
  }
  .qr-hint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .qr-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-qr-share,
  .btn-qr-copy {
    width: 100%;
    padding: 11px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-qr-share {
    border: none;
    background: var(--accent);
    color: #fff;
  }
  .btn-qr-share:hover { background: var(--accent-hover); }
  .btn-qr-share.hidden { display: none; }
  .btn-qr-copy {
    border: none;
    background: var(--accent);
    color: #fff;
  }
  .btn-qr-copy:hover { background: var(--accent-hover); }
  .qr-actions.has-share .btn-qr-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .qr-actions.has-share .btn-qr-copy:hover {
    background: var(--surface-2);
    border-color: var(--text-dim);
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .logo span { color: var(--accent); }

  .bar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .bar-main {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .bar-nick {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .bar-nick:focus {
    border-color: var(--accent);
    outline: none;
  }

  .bar select, .bar input:not(.bar-nick) {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }

  .bar select:focus, .bar input:focus {
    border-color: var(--accent);
    outline: none;
  }

  .bar button {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    margin-left: auto;
  }

  .btn-record {
    background: var(--record);
    color: #fff;
    border-color: var(--record);
  }

  .btn-record:hover { background: var(--record-hover); }

  .btn-record.idle {
    background: var(--idle);
    border-color: var(--idle);
  }

  .btn-record.idle:hover { background: var(--idle-hover); }

  .btn-record:disabled { opacity: 0.4; cursor: default; }

  .btn-record.recording {
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.5);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
  }

  .status {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 2px 0;
  }

  .conn {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .conn-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .input-footer {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-row textarea {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea:disabled { opacity: 0.4; }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 2px 0;
  }

  .input-row button {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
    height: 42px;
    margin-bottom: 0;
  }

  .btn-send {
    background: var(--accent);
    color: #fff;
  }

  .btn-send:hover { background: var(--accent-hover); }
  .btn-send:disabled { opacity: 0.4; cursor: default; }

  .log {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-top {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .history-top.hidden { display: none; }

  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
    user-select: none;
  }

  .empty-state .icon { font-size: 32px; opacity: 0.5; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 280px; }

  .entry {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--other-border);
    animation: in 0.2s ease;
    max-width: 92%;
  }

  .entry.mine {
    align-self: flex-end;
    border-color: var(--mine-border);
    background: var(--surface-2);
  }

  .entry.other { align-self: flex-start; }

  .entry.interim {
    opacity: 0.7;
    border-style: dashed;
  }

  .entry.error {
    align-self: center;
    max-width: 100%;
    border-color: #f8514944;
    background: #f8514911;
  }

  @keyframes in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry .spk {
    font-weight: 600;
    font-size: 11px;
    margin-bottom: 6px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .entry .spk-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .entry .main {
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    word-break: break-word;
  }

  .entry .sub {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.45;
    margin-top: 4px;
    word-break: break-word;
  }

  .entry .main.tent { color: var(--text-muted); }
  .entry .main.final { color: var(--text); }
  .entry .sub.tent { color: var(--text-dim); }
  .entry .sub.waiting {
    color: var(--text-dim);
    font-style: italic;
    animation: fade-wait 1.4s ease-in-out infinite;
  }

  @keyframes fade-wait {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.on { background: var(--idle); box-shadow: 0 0 6px #3fb95066; }
  .dot.off { background: var(--record); box-shadow: 0 0 6px #f8514966; }

  .hint { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .dir-hint {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .room-badge {
    grid-column: 2;
    grid-row: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    background: var(--surface-2);
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .room-badge:hover { background: var(--border); border-color: var(--text-dim); }
  .room-badge:active { transform: scale(0.98); }
  .room-badge-num {
    letter-spacing: 0.12em;
  }
  .room-badge-icon {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .copy-toast {
    position: fixed;
    left: 50%;
    bottom: 88px;
    transform: translateX(-50%) translateY(12px);
    opacity: 0;
    pointer-events: none;
    padding: 10px 18px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 8px 24px #00000055;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 150;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #lobby {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
  }
  #lobby.hidden { display: none; }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px 32px;
    width: min(400px, calc(100vw - 32px));
    text-align: center;
  }
  .lobby-card h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .lobby-card h1 span { color: var(--accent); }
  .lobby-card .sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 28px;
    line-height: 1.55;
    padding: 0 4px;
  }
  .lobby-join {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  .room-code {
    display: flex;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }
  .room-digit {
    flex: 1;
    max-width: 52px;
    min-width: 0;
    aspect-ratio: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
    padding: 0;
    caret-color: var(--accent);
  }
  .room-digit:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #3d8bfd22;
  }
  .room-digit.filled {
    border-color: var(--text-dim);
    background: var(--surface-2);
  }
  .lobby-join button {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: background 0.15s;
    font-family: inherit;
  }
  .lobby-join button:hover:not(:disabled) { background: var(--accent-hover); }
  .lobby-join button:disabled { opacity: 0.55; cursor: default; }
  .lobby-divider {
    color: var(--text-dim);
    font-size: 12px;
    margin: 16px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lobby-divider::before, .lobby-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .btn-new-room {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
    line-height: 1.4;
  }
  .btn-new-room:hover:not(:disabled) { background: var(--surface-2); border-color: var(--text-dim); }
  .btn-new-room:disabled { opacity: 0.55; cursor: default; }
  .lobby-error {
    color: var(--record);
    font-size: 12px;
    margin-top: 12px;
    min-height: 1.2em;
  }

  @media (max-width: 600px) {
    header {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      padding: 10px 14px 12px;
      gap: 8px 10px;
    }
    .logo {
      grid-column: 1;
      grid-row: 1;
      font-size: 14px;
    }
    .header-end {
      grid-column: 2;
      grid-row: 1;
    }
    .room-badge {
      grid-column: 1 / -1;
      grid-row: 2;
      width: 100%;
      justify-content: center;
      padding: 12px 16px;
      font-size: 15px;
      border-radius: 10px;
    }
    .room-badge-num { font-size: 22px; letter-spacing: 0.16em; }
    .room-badge-label { display: none; }
    .room-badge-icon { display: inline; }
    .conn-label { display: none; }
    .bar, .input-footer {
      padding-left: 14px;
      padding-right: 14px;
    }
    .input-footer {
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }
    .log { padding: 12px 14px; }
    .status { display: none; }
    .dir-hint { font-size: 12px; }
    .bar select { flex: 1; min-width: 0; max-width: 140px; }
    .bar button {
      min-width: 72px;
      min-height: 40px;
      margin-left: auto;
    }
    .input-hint { display: none; }
    .input-row button {
      min-width: 56px;
      padding: 10px 14px;
    }
    .entry { max-width: 100%; }
    .lobby-card { padding: 32px 20px 24px; }
    .room-code { gap: 6px; }
    .room-digit { font-size: 20px; border-radius: 8px; max-width: 48px; }
    /* iOS: font-size < 16px on focus causes auto-zoom */
    .bar select,
    .bar-nick,
    .input-row textarea {
      font-size: 16px;
    }
    .copy-toast {
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      max-width: calc(100vw - 32px);
      white-space: normal;
      text-align: center;
    }
    .qr-modal {
      align-items: flex-end;
      padding: 0;
    }
    .qr-card {
      width: 100%;
      max-width: 100%;
      border-radius: 16px 16px 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    }
    .qr-wrap canvas,
    .qr-wrap img {
      width: min(200px, 60vw) !important;
      height: min(200px, 60vw) !important;
    }
  }

  @media (min-width: 601px) {
    .room-badge-icon { display: none; }
    .bar {
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
    }
    .bar-main { flex: 0 1 auto; }
    .bar-nick {
      width: auto;
      flex: 0 1 160px;
      min-width: 100px;
    }
    .status {
      flex: 1;
      min-width: 0;
      margin-left: auto;
      text-align: right;
    }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-card">
    <h1>Stream <span>Translator</span></h1>
    <p class="sub" id="lobbySub">ルーム番号を入力するか、新しいルームを作成してください</p>
    <div class="lobby-join">
      <div class="room-code" id="roomCode">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="1">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="2">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="3">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="4">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="5">
        <input type="text" class="room-digit" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="6">
      </div>
      <button id="joinBtn" type="button">入室</button>
    </div>
    <div class="lobby-divider">or</div>
    <button class="btn-new-room" id="newRoomBtn">新しいルームを作成</button>
    <p class="lobby-error" id="lobbyError"></p>
  </div>
</div>

<div id="chat">
<header>
  <div class="logo">Stream <span>Translator</span></div>
  <button type="button" class="room-badge" id="roomBadge" title="">
    <span class="room-badge-label" id="roomBadgeLabel">ルーム:</span>
    <span class="room-badge-num" id="roomBadgeNum"></span>
    <span class="room-badge-icon" id="roomBadgeIcon">QR</span>
  </button>
  <div class="header-end">
    <span class="conn">
      <span class="dot off" id="connDot"></span>
      <span class="conn-label" id="connLabel">Disconnected</span>
    </span>
    <div class="menu-wrap">
      <button id="menuBtn" class="btn-menu" type="button" aria-label="Menu">⋯</button>
      <div id="menuDrop" class="menu-drop hidden">
        <button id="dissolveBtn" class="menu-item danger" type="button">ルームを解散</button>
      </div>
    </div>
  </div>
</header>

<div class="bar">
  <div class="bar-main">
    <select id="myLang">
      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
    </select>
    <span class="dir-hint" id="dirHint"></span>
    <button id="recordBtn" class="btn-record idle" disabled></button>
  </div>
  <input type="text" id="spkInput" class="bar-nick" placeholder="" maxlength="20">
  <span class="status" id="statusMsg"></span>
</div>

<div class="log" id="log">
  <div class="history-top hidden" id="historyTop"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">🎙️</div>
    <p id="emptyText"></p>
  </div>
</div>

<div class="input-footer">
  <div class="input-row">
    <textarea id="textInput" rows="1" placeholder="" disabled></textarea>
    <button id="sendBtn" class="btn-send" disabled></button>
  </div>
  <span class="input-hint" id="inputHint"></span>
</div>
</div>

<span class="copy-toast" id="copyToast" aria-live="polite"></span>

<div id="qrModal" class="qr-modal hidden">
  <div class="qr-card">
    <button id="qrClose" class="qr-close" type="button" aria-label="close">&times;</button>
    <div class="qr-title" id="qrTitle">ルームを共有</div>
    <div class="qr-room-num" id="qrRoomNum"></div>
    <div class="qr-wrap" id="qrCode"></div>
    <p class="qr-hint" id="qrHint">QRコードを読み取って入室</p>
    <div class="qr-actions" id="qrActions">
      <button id="qrShareBtn" class="btn-qr-share hidden" type="button">共有</button>
      <button id="qrCopyBtn" class="btn-qr-copy" type="button">リンクをコピー</button>
    </div>
  </div>
</div>

<script src="vendor/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
